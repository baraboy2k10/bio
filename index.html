<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio Link | Baraboy 2k10</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0b0c1e; /* Màu nền tối */
            --glass-bg: rgba(255, 255, 255, 0.03); /* Nền mờ */
            --glass-border: rgba(255, 255, 255, 0.08); /* Viền mờ */
            --text-main: #ffffff;
            --text-muted: #b0b0b0;
            --accent: #20c997; /* Màu xanh ngọc nổi bật */
            --fb-color: #2b70ff; /* Xanh dương Facebook */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 0%, #1a1c35 0%, #0b0c1e 80%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 24px;
            text-align: center;
        }

        /* --- Profile Section --- */
        .profile .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--glass-border);
            margin-bottom: 15px;
        }

        .profile h1 {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .profile .highlight-text {
            color: var(--accent); /* Màu xanh ngọc nổi bật */
            font-size: 1.2rem;
            font-weight: 700;
            font-style: normal; /* Không in nghiêng */
            margin-top: 10px;
        }

        .section-title {
            text-align: left;
            font-size: 1.1rem;
            margin-bottom: 15px;
            margin-top: 10px;
            font-weight: 600;
            color: var(--text-main);
        }

        /* --- Custom Links Section --- */
        .custom-link-btn {
            display: flex;
            align-items: center;
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 16px;
            text-decoration: none;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        .custom-link-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
        }

        .icon-box {
            width: 48px;
            height: 48px;
            border-radius: 12px; 
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1.3rem;
            margin-right: 15px;
        }

        .fb-color { background-color: var(--fb-color); }
        .web-color { background-color: var(--accent); }

        .link-title {
            flex-grow: 1;
            color: var(--text-main);
            font-size: 1.05rem;
            font-weight: 600;
            text-align: left;
        }

        .arrow {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-right: 10px;
        }

        /* --- Bank Section --- */
        .bank-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            text-align: left;
        }

        .bank-details {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .bank-logo {
            width: 45px;
            height: 45px;
            border-radius: 8px;
            object-fit: contain;
            background: #fff;
            padding: 2px;
        }

        .bank-text div:first-child {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 4px;
        }

        .bank-text .acc-number {
            font-size: 1.1rem;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .bank-text .acc-name {
            font-size: 0.85rem;
            margin-top: 4px;
            text-transform: uppercase;
        }

        .copy-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            width: 40px;
            height: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .copy-btn:hover {
            opacity: 0.8;
        }

        /* --- QR Section --- */
        .qr-section {
            margin-top: 15px;
        }

        .qr-header {
            font-size: 1.1rem;
            margin-bottom: 12px;
            font-weight: 600;
            text-align: center;
        }

        .qr-image {
            width: 100%;
            max-width: 250px;
            border-radius: 12px;
            margin: 10px 0;
            border: 2px solid var(--glass-border);
        }

        .qr-instruction {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* --- Toast Notification --- */
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 12px;
            position: fixed;
            z-index: 1;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s, bottom 0.3s;
        }

        #toast.show {
            visibility: visible;
            opacity: 1;
            bottom: 50px;
        }

        footer {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-top: 20px;
            padding-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="glass-panel profile">
            <img src="avatar.png" alt="Avatar" class="avatar" onerror="this.src='https://via.placeholder.com/100'">
            <h1>Baraboy 2k10</h1>
            <p class="highlight-text">Zalo: 0965.25.6969</p>
        </div>

        <div class="glass-panel">
            <h2 class="section-title">LIÊN KẾT CHÍNH</h2>
            
            <a href="https://www.facebook.com/tran.inh.tu.720066/" class="custom-link-btn" target="_blank">
                <div class="icon-box fb-color">
                    <i class="fa-brands fa-facebook-f"></i>
                </div>
                <span class="link-title">Facebook Cá Nhân</span>
                <i class="fa-solid fa-chevron-right arrow"></i>
            </a>

            <a href="https://baraboyshop.com/" class="custom-link-btn" target="_blank">
                <div class="icon-box web-color">
                    <i class="fa-solid fa-globe"></i>
                </div>
                <span class="link-title">Web Acc</span>
                <i class="fa-solid fa-chevron-right arrow"></i>
            </a>
        </div>

        <div class="glass-panel">
            <h2 class="section-title">Thông tin chuyển khoản</h2>
            
            <div class="bank-info">
                <div class="bank-details">
                    <img src="https://img.mservice.com.vn/app/img/payment/mb.png" alt="MB Bank" class="bank-logo" onerror="this.src='https://via.placeholder.com/45'">
                    <div class="bank-text">
                        <div>Ngân hàng Quân Đội (MB)</div>
                        <div class="acc-number" id="acc-number">44446668386</div>
                        <div class="acc-name">TRAN DINH TU</div>
                    </div>
                </div>
                <button class="copy-btn" onclick="copySTK()" title="Sao chép số tài khoản">
                    <i class="fa-regular fa-copy"></i>
                </button>
            </div>

            <div class="qr-section">
                <div class="qr-header">Google đọc</div>
                <img src="wescan.png" alt="WESCAN QR Code" class="qr-image" onerror="this.src='https://via.placeholder.com/250'">
                <div class="qr-instruction">WESCAN.vn/BARABOY</div>
            </div>
        </div>

        <footer>
            © 2026 Baraboy 2k10.
        </footer>
    </div>

    <div id="toast"><i class="fa-solid fa-check-circle" style="color: #4cd137; margin-right: 8px;"></i>Đã sao chép số tài khoản!</div>

    <script>
        function copySTK() {
            var stk = document.getElementById("acc-number").innerText;
            navigator.clipboard.writeText(stk).then(function() {
                var toast = document.getElementById("toast");
                toast.className = "show";
                setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 3000);
            }, function(err) {
                console.error('Không thể sao chép: ', err);
            });
        }
    </script>
</body>
</html>
